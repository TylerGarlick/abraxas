version: '3.8'

services:
  arangodb:
    image: arangodb/arangodb:latest
    container_name: abraxas-arangodb
    ports:
      - "8529:8529"
    environment:
      - ARANGO_ROOT_PASSWORD=${ARANGO_ROOT_PASSWORD:-5orange5}
    volumes:
      - arango_data:/var/lib/arangodb
    restart: always

  api-service:
    image: oven/bun:latest
    container_name: abraxas-api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "4000:4000"
    command: bun run infra/api/service/index.ts
    environment:
      - ARANGO_URL=http://arangodb:8529
      - ARANGO_DB=abraxas_db
      - ARANGO_USER=${ARANGO_USER:-root}
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:-5orange5}
    restart: always
    depends_on:
      - arangodb

  dream-reservoir:
    image: oven/bun:latest
    container_name: abraxas-mcp-dream
    working_dir: /app/mcps/dream-reservoir
    volumes:
      - .:/app
    command: bun run src/server.ts
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - ARANGO_URL=http://arangodb:8529
      - ARANGO_DB=abraxas_db
      - ARANGO_USER=${ARANGO_USER:-root}
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:-5orange5}
    restart: always
    depends_on:
      - arangodb

  soter-verifier:
    image: oven/bun:latest
    container_name: abraxas-mcp-soter
    working_dir: /app/mcps/soter-verifier
    volumes:
      - .:/app
    command: bun run src/server.ts
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
    restart: always
    depends_on:
      - arangodb

  mnemosyne-memory:
    image: oven/bun:latest
    container_name: abraxas-mcp-mnemosyne
    working_dir: /app/mcps/mnemosyne-memory
    volumes:
      - .:/app
    command: bun run src/server.ts
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: always
    depends_on:
      - arangodb

  janus-orchestrator:
    image: oven/bun:latest
    container_name: abraxas-mcp-janus
    working_dir: /app/mcps/janus-orchestrator
    volumes:
      - .:/app
    command: bun run src/server.ts
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    restart: always
    depends_on:
      - arangodb

  guardrail-monitor:
    image: oven/bun:latest
    container_name: abraxas-mcp-guardrail
    working_dir: /app/mcps/guardrail-monitor
    volumes:
      - .:/app
    command: bun run src/server.ts
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    restart: always
    depends_on:
      - arangodb

  research-engine:
    image: oven/bun:latest
    container_name: abraxas-mcp-research
    working_dir: /app/mcps/research-engine
    volumes:
      - .:/app
    command: bun run src/server.ts
    restart: always
    depends_on:
      - arangodb

  project-bridge:
    image: oven/bun:latest
    container_name: abraxas-mcp-bridge
    working_dir: /app/mcps/project-bridge
    volumes:
      - .:/app
    command: bun run src/server.ts
    restart: always
    depends_on:
      - arangodb

  sovereign-core:
    image: oven/bun:latest
    container_name: abraxas-mcp-core
    working_dir: /app/mcps/sovereign-core
    volumes:
      - .:/app
    command: bun run src/server.ts
    restart: always
    depends_on:
      - arangodb

volumes:
  arango_data:
