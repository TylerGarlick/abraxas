# version: '3.8'

services:
  # --- SOVEREIGN CORE (The Brain) ---
  soter-verifier:
    image: oven/bun:latest
    container_name: abraxas-mcp-soter
    working_dir: /app
    command: bun start
    environment:
      - ABRAXAS_ROOT=/workspace
      - SOTER_SCRIPTS_PATH=/workspace/skills/soter/scripts
      - SOTER_CONSTITUTION_PATH=/workspace/constitution/constitution-soter.md
    volumes:
      - .:/workspace
      - ./mcps/soter-verifier:/app

  mnemosyne-memory:
    image: oven/bun:latest
    container_name: abraxas-mcp-mnemosyne
    volumes:
      - ./mcps/mnemosyne-memory:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3003:3003"
    restart: always

  janus-orchestrator:
    image: oven/bun:latest
    container_name: abraxas-mcp-janus
    volumes:
      - ./mcps/janus-orchestrator:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3004:3004"
    restart: always

  guardrail-monitor:
    image: oven/bun:latest
    container_name: abraxas-mcp-guardrail
    volumes:
      - ./mcps/guardrail-monitor:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3005:3005"
    restart: always

  episteme:
    image: oven/bun:latest
    container_name: abraxas-mcp-episteme
    volumes:
      - ./mcps/episteme:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3006:3006"
    restart: always

  ethos:
    image: oven/bun:latest
    container_name: abraxas-mcp-ethos
    volumes:
      - ./mcps/ethos:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3007:3007"
    restart: always

  kairos:
    image: oven/bun:latest
    container_name: abraxas-mcp-kairos
    volumes:
      - ./mcps/kairos:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3008:3008"
    restart: always

  sovereign-scribe:
    image: oven/bun:latest
    container_name: abraxas-mcp-scribe
    volumes:
      - ./mcps/sovereign-scribe:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3009:3009"
    restart: always

  dream-reservoir:
    image: oven/bun:latest
    container_name: abraxas-mcp-dream
    volumes:
      - ./mcps/dream-reservoir:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3001:3001"
    restart: always

  config-registry:
    image: oven/bun:latest
    container_name: abraxas-mcp-config
    volumes:
      - ./mcps/config-registry:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3014:3014"
    restart: always

  project-bridge:
    image: oven/bun:latest
    container_name: mcp-project-bridge
    volumes:
      - ./mcps/project-bridge:/app
      - ../:/workspace
    working_dir: /app
    command: bun run src/index.ts
    restart: always

  research-engine:
    image: oven/bun:latest
    container_name: mcp-research-engine
    volumes:
      - ./mcps/research-engine:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3010:3010"
    restart: always

  sovereign-core:
    image: oven/bun:latest
    container_name: abraxas-mcp-core
    volumes:
      - ./mcps/sovereign-core:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3011:3011"
    restart: always

  # aletheia-truth:
  #   image: oven/bun:latest
  #   container_name: abraxas-mcp-aletheia
  #   volumes:
  #     - ./mcps/aletheia-truth:/app
  #   working_dir: /app
  #   command: bun run src/server.ts
  #   ports:
  #     - "3006:3001"
  #   restart: always

  retrospectives:
    image: oven/bun:latest
    container_name: abraxas-mcp-retro
    volumes:
      - ./mcps/retrospectives:/app
      - .:/workspace
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3012:3012"
    restart: always

  ledger:
    image: oven/bun:latest
    container_name: abraxas-mcp-ledger
    volumes:
      - ./mcps/ledger:/app
    working_dir: /app
    command: bun run src/index.ts
    ports:
      - "3013:3013"
    environment:
      - ARANGO_URL=http://arangodb:8529
    restart: always


  arangodb:
    image: arangodb/arangodb:latest
    container_name: abraxas-arangodb
    environment:
      - ARANGO_ROOT_PASSWORD=5orange5
    ports:
      - "8529:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb
    restart: always

volumes:
  arangodb_data:
