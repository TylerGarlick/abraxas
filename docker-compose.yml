version: '3.8'

services:
  # --- SOVEREIGN CORE (Reconstructed) ---
  soter-verifier:
    image: oven/bun:latest
    container_name: abraxas-mcp-soter
    volumes:
      - ./mcps/soter-verifier:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3002:3002"
    restart: always

  aletheia-truth:
    image: oven/bun:latest
    container_name: abraxas-mcp-aletheia
    volumes:
      - ./mcps/aletheia-truth:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3006:3006"
    restart: always

  mnemosyne-memory:
    image: oven/bun:latest
    container_name: abraxas-mcp-mnemosyne
    volumes:
      - ./mcps/mnemosyne-memory:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3003:3003"
    restart: always

  janus-orchestrator:
    image: oven/bun:latest
    container_name: abraxas-mcp-janus
    volumes:
      - ./mcps/janus-orchestrator:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3004:3004"
    restart: always

  guardrail-monitor:
    image: oven/bun:latest
    container_name: abraxas-mcp-guardrail
    volumes:
      - ./mcps/guardrail-monitor:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3005:3005"
    restart: always

  dream-reservoir:
    image: oven/bun:latest
    container_name: abraxas-mcp-dream
    volumes:
      - ./mcps/dream-reservoir:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3001:3001"
    restart: always

  config-registry:
    image: oven/bun:latest
    container_name: abraxas-mcp-config
    volumes:
      - ./mcps/config-registry:/app
    working_dir: /app
    command: bun run src/server.ts
    ports:
      - "3007:3007"
    restart: always

  # --- LEGACY & UTILITY MCPs ---
  secrets-manager:
    image: oven/bun:latest
    container_name: mcp-secrets-manager
    volumes:
      - ./mcps/secrets-manager:/app
    working_dir: /app
    command: bun run index.ts
    restart: always

  beads-retros:
    image: oven/bun:latest
    container_name: mcp-beads-retros
    volumes:
      - ./mcps/beads-retros:/app
    working_dir: /app
    command: bun run index.ts
    restart: always

  memory:
    image: oven/bun:latest
    container_name: mcp-memory
    volumes:
      - ./mcps/memory:/app
    working_dir: /app
    command: bun run index.ts
    restart: always

  system-status:
    image: oven/bun:latest
    container_name: mcp-system-status
    volumes:
      - ./mcps/system-status:/app
    working_dir: /app
    command: bun run index.ts
    ports:
      - "8080:8080"
    restart: always

  project-bridge:
    image: oven/bun:latest
    container_name: mcp-project-bridge
    volumes:
      - ./mcps/project-bridge:/app
      - ../:/workspace
    working_dir: /app
    command: bun run src/index.ts
    restart: always

  research-engine:
    image: oven/bun:latest
    container_name: mcp-research-engine
    volumes:
      - ./mcps/research-engine:/app
    working_dir: /app
    command: bun run src/server.ts
    restart: always

  pipeline-orchestrator:
    image: oven/bun:latest
    container_name: mcp-pipeline-orchestrator
    volumes:
      - ./mcps/pipeline-orchestrator:/app
      - ../state:/app/state
    working_dir: /app
    command: bun run index.ts
    restart: always

  mcp-arangodb:
    image: oven/bun:latest
    container_name: mcp-arangodb
    volumes:
      - ./mcps/mcp-arangodb:/app
    working_dir: /app
    command: bun run src/index.ts
    environment:
      - ARANGO_HOST=http://abraxas-arangodb:8529
    networks:
      - abraxas_default
    restart: always

  dolt-server:
    image: dolthub/dolt:latest
    container_name: dolt-server
    volumes:
      - ../.beads:/dolt/beads
    ports:
      - "3306:3306"
    command: sql-server --data-dir /dolt/beads
    networks:
      - dolt_network
    restart: always

networks:
  abraxas_default:
    external: true
  dolt_network:
    driver: bridge
