version: "3.8"

services:
  arangodb:
    image: arangodb:latest
    environment:
      ARANGO_ROOT_PASSWORD: test_password
    ports:
      - "8529:8529"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8529/_api/version || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama-mock:
    build: ./ollama_mock
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/v1/info || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10
